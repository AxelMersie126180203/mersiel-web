<svg
  width="190"
  viewBox="0 0 187 167"
  xmlns="http://www.w3.org/2000/svg"
  aria-label="Mersiel Loader"
>
  <defs>
    <linearGradient id="leftStroke" x1="18" y1="146" x2="110" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4a1fd1" />
      <stop offset="50%" stop-color="#6f2cde" />
      <stop offset="100%" stop-color="#8d35e5" />
    </linearGradient>

    <linearGradient id="midStroke" x1="88" y1="126" x2="158" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7d2fe0" />
      <stop offset="55%" stop-color="#cf239f" />
      <stop offset="100%" stop-color="#ff2f92" />
    </linearGradient>

    <linearGradient id="rightStroke" x1="131" y1="118" x2="170" y2="84" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff4949" />
      <stop offset="100%" stop-color="#ff2323" />
    </linearGradient>

    <filter id="softGlow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="0.9" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="runnerGlow" x="-55%" y="-55%" width="210%" height="210%">
      <feGaussianBlur stdDeviation="1.15" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      .track,
      .runner,
      .soft {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-miterlimit: 1;
        vector-effect: non-scaling-stroke;
      }

      .track {
        stroke-width: 0.72;
        opacity: 0.24;
      }

      .runner {
        stroke-width: 1.02;
        stroke-dasharray: 38 62;
        stroke-dashoffset: 100;
        animation: pieceTravel 3.3s linear infinite;
      }

      .soft {
        stroke-width: 1.42;
        opacity: 0.14;
        filter: blur(0.42px);
        stroke-dasharray: 44 56;
        stroke-dashoffset: 100;
        animation: pieceSoft 3.3s linear infinite;
      }

      .mid-delay {
        animation-delay: 1.1s;
      }

      .right-delay {
        animation-delay: 2.2s;
      }

      @keyframes pieceTravel {
        0% {
          stroke-dashoffset: 100;
          opacity: 0;
        }
        6% {
          opacity: 0.98;
        }
        27% {
          opacity: 0.98;
        }
        33.33% {
          stroke-dashoffset: 0;
          opacity: 0;
        }
        100% {
          stroke-dashoffset: 0;
          opacity: 0;
        }
      }

      @keyframes pieceSoft {
        0% {
          stroke-dashoffset: 100;
          opacity: 0;
        }
        7% {
          opacity: 0.14;
        }
        27% {
          opacity: 0.14;
        }
        33.33% {
          stroke-dashoffset: 0;
          opacity: 0;
        }
        100% {
          stroke-dashoffset: 0;
          opacity: 0;
        }
      }
    </style>
  </defs>

  <g filter="url(#softGlow)">
    <path
      class="track"
      pathLength="100"
      stroke="url(#leftStroke)"
      d="M 22 141 C 20 137, 20 129, 21 121 C 24 101, 31 82, 42 63 C 52 47, 64 32, 79 20 C 82 18, 86 18, 88 21 C 96 36, 102 51, 108 69 C 96 82, 84 94, 71 106 C 62 114, 52 123, 42 130 C 35 135, 28 139, 22 141 Z"
    />
    <path
      class="track"
      pathLength="100"
      stroke="url(#midStroke)"
      d="M 106 129 C 103 126, 99 118, 96 112 C 94 107, 92 102, 90 97 C 107 79, 124 60, 142 41 C 145 38, 148 35, 150 36 C 152 38, 153 48, 155 58 C 157 66, 158 72, 159 77 C 142 94, 124 112, 106 129 Z"
    />
    <path
      class="track"
      pathLength="100"
      stroke="url(#rightStroke)"
      d="M 165 123 C 156 120, 146 117, 135 114 C 136 111, 144 103, 151 96 C 156 91, 160 87, 161 87 C 162 88, 162 94, 163 100 C 164 107, 166 115, 166 121 C 166 122, 166 123, 165 123 Z"
    />
  </g>

  <g filter="url(#runnerGlow)">
    <path
      class="runner"
      pathLength="100"
      stroke="url(#leftStroke)"
      d="M 22 141 C 20 137, 20 129, 21 121 C 24 101, 31 82, 42 63 C 52 47, 64 32, 79 20 C 82 18, 86 18, 88 21 C 96 36, 102 51, 108 69 C 96 82, 84 94, 71 106 C 62 114, 52 123, 42 130 C 35 135, 28 139, 22 141 Z"
    />
    <path
      class="runner mid-delay"
      pathLength="100"
      stroke="url(#midStroke)"
      d="M 106 129 C 103 126, 99 118, 96 112 C 94 107, 92 102, 90 97 C 107 79, 124 60, 142 41 C 145 38, 148 35, 150 36 C 152 38, 153 48, 155 58 C 157 66, 158 72, 159 77 C 142 94, 124 112, 106 129 Z"
    />
    <path
      class="runner right-delay"
      pathLength="100"
      stroke="url(#rightStroke)"
      d="M 165 123 C 156 120, 146 117, 135 114 C 136 111, 144 103, 151 96 C 156 91, 160 87, 161 87 C 162 88, 162 94, 163 100 C 164 107, 166 115, 166 121 C 166 122, 166 123, 165 123 Z"
    />
  </g>

  <g>
    <path
      class="soft"
      pathLength="100"
      stroke="url(#leftStroke)"
      d="M 22 141 C 20 137, 20 129, 21 121 C 24 101, 31 82, 42 63 C 52 47, 64 32, 79 20 C 82 18, 86 18, 88 21 C 96 36, 102 51, 108 69 C 96 82, 84 94, 71 106 C 62 114, 52 123, 42 130 C 35 135, 28 139, 22 141 Z"
    />
    <path
      class="soft mid-delay"
      pathLength="100"
      stroke="url(#midStroke)"
      d="M 106 129 C 103 126, 99 118, 96 112 C 94 107, 92 102, 90 97 C 107 79, 124 60, 142 41 C 145 38, 148 35, 150 36 C 152 38, 153 48, 155 58 C 157 66, 158 72, 159 77 C 142 94, 124 112, 106 129 Z"
    />
    <path
      class="soft right-delay"
      pathLength="100"
      stroke="url(#rightStroke)"
      d="M 165 123 C 156 120, 146 117, 135 114 C 136 111, 144 103, 151 96 C 156 91, 160 87, 161 87 C 162 88, 162 94, 163 100 C 164 107, 166 115, 166 121 C 166 122, 166 123, 165 123 Z"
    />
  </g>
</svg>
